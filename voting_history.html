<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting History - Campus E-Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { 
      --sidebar-width: 260px; 
      --header-height: 80px;
      --gitam-green: #00695c;
    }
    body { font-family: 'Inter', sans-serif; }
    .nav-link-active { background-color: var(--gitam-green); color: white; }
    .nav-link:not(.nav-link-active):hover { background-color: #f0fdf4; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<div class="flex h-screen">
  <aside class="w-[var(--sidebar-width)] bg-white flex flex-col flex-shrink-0 border-r">
    <div class="px-6 h-[var(--header-height)] flex items-center border-b">
      <a href="index.html" class="text-2xl font-bold flex items-center gap-3 text-gray-800">
        <img src="images/gitamlogo.png" alt="Gitam Logo" class="h-10 w-auto object-contain">
        <span>E-Voting</span>
      </a>
    </div>
    <nav class="flex-grow p-4 space-y-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg font-medium text-gray-600 hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        Home
      </a>
      <a href="results.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg font-medium text-gray-600 hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        Results
      </a>
       <a href="voting_history.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg font-semibold nav-link-active">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        Voting History
      </a>
    </nav>
    <div class="p-4 border-t text-xs text-gray-500">
      &copy; 2025 Campus E-Voting System
    </div>
  </aside>

  <div class="flex-1 flex flex-col">
    <header class="flex-shrink-0 bg-white h-[var(--header-height)] border-b flex items-center justify-between px-8 gap-4">
        <h1 class="text-2xl font-bold text-gray-900">My Voting History</h1>
        <div class="relative" id="user-profile-container"></div>
    </header>
    <main class="flex-1 p-8 overflow-y-auto bg-gray-50">
      <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg border shadow-md overflow-hidden">
          <table class="min-w-full divide-y">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Election</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Position</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Candidate Voted For</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date & Time Voted</th>
              </tr>
            </thead>
            <tbody id="history-table-body" class="bg-white divide-y"></tbody>
          </table>
        </div>
        <div id="no-history-message" class="hidden text-center p-10 bg-white rounded-lg border mt-4">
            <p class="text-gray-500">You have not cast any votes yet.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = "login.html"; return; }

    const voterDoc = await db.collection('voters').doc(user.uid).get();
    const voterName = voterDoc.exists ? voterDoc.data().name : "User";
    const admissionNumber = voterDoc.exists ? voterDoc.data().admissionNumber : "User";
    renderUserProfile(voterName, admissionNumber.toUpperCase(), user.email);

    const tableBody = document.getElementById('history-table-body');
    const noHistoryMessage = document.getElementById('no-history-message');
    
    const [votesSnapshot, electionsSnapshot, positionsSnapshot, candidatesSnapshot] = await Promise.all([
        db.collection("votes").where("voterID", "==", user.uid).orderBy("timestamp", "desc").get(),
        db.collection("elections").get(),
        db.collection("positions").get(),
        db.collection("candidates").get()
    ]);

    if (votesSnapshot.empty) {
        noHistoryMessage.classList.remove('hidden');
        document.querySelector('table').classList.add('hidden');
        return;
    }

    const electionsMap = new Map(electionsSnapshot.docs.map(doc => [doc.id, doc.data()]));
    const positionsMap = new Map(positionsSnapshot.docs.map(doc => [doc.id, doc.data()]));
    const candidatesMap = new Map(candidatesSnapshot.docs.map(doc => [doc.id, doc.data()]));

    let tableHTML = '';
    votesSnapshot.forEach(voteDoc => {
      const voteData = voteDoc.data();
      
      // --- STANDARDIZED: Reading 'electionId', 'positionId', 'candidateId' ---
      const election = electionsMap.get(voteData.electionId);
      const position = positionsMap.get(voteData.positionId);
      const candidate = candidatesMap.get(voteData.candidateId);
      
      const electionName = election ? election.title : "N/A";
      const positionName = position ? position.title : "N/A";
      const candidateName = candidate ? candidate.name : "N/A";
      const voteTimestamp = voteData.timestamp ? new Date(voteData.timestamp.seconds * 1000).toLocaleString() : "N/A";

      tableHTML += `
        <tr>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${electionName}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${positionName}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${candidateName}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${voteTimestamp}</td>
        </tr>
      `;
    });
    
    tableBody.innerHTML = tableHTML;
  });

  function renderUserProfile(name, id, email) {
    const container = document.getElementById('user-profile-container');
    container.innerHTML = `
      <button id="profileBtn" class="w-10 h-10 rounded-full bg-green-700 text-white font-semibold flex items-center justify-center text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">${id}</button>
      <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl z-20 border py-1">
        <div class="px-4 py-2 border-b">
          <p class="text-sm font-medium text-gray-900 truncate">${name}</p>
          <p class="text-xs text-gray-500 truncate">${email}</p>
        </div>
        <a id="logoutBtn" href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-b-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    `;
    
    document.getElementById('profileBtn').addEventListener('click', (e) => { 
      e.stopPropagation();
      document.getElementById('dropdownMenu').classList.toggle('hidden'); 
    });
    document.getElementById('logoutBtn').addEventListener('click', (e) => { 
      e.preventDefault(); 
      auth.signOut(); 
    });
  }

  window.addEventListener('click', () => { 
    const menu = document.getElementById('dropdownMenu');
    if (menu && !menu.classList.contains('hidden')) {
      menu.classList.add('hidden');
    }
  });
</script>
</body>
</html>
