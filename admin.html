<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</head>
<body>
  <h1>Admin Dashboard</h1>

  <h2>Create Election</h2>
  <form id="createElectionForm">
    <input type="text" id="electionTitle" placeholder="Election Title" required><br>
    <input type="datetime-local" id="startDate" required><br>
    <input type="datetime-local" id="endDate" required><br>
    <button type="submit">Create Election</button>
  </form>

  <h2>Create Position</h2>
  <form id="createPositionForm">
    <input type="text" id="positionTitle" placeholder="Position Title" required><br>
    <input type="text" id="positionElectionId" placeholder="Election ID" required><br>
    <button type="submit">Add Position</button>
  </form>

  <h2>Add Candidate</h2>
  <form id="createCandidateForm">
    <input type="text" id="candidateName" placeholder="Candidate Name" required><br>
    <input type="text" id="candidatePositionId" placeholder="Position ID" required><br>
    <input type="text" id="candidateElectionId" placeholder="Election ID" required><br>
    <button type="submit">Add Candidate</button>
  </form>
</body>
</html>
