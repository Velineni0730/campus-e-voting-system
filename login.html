<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Voting System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">Welcome Back!</h1>
      <p class="text-gray-600">Please sign in to your account</p>
    </div>

    <form id="loginForm" class="space-y-6" autocomplete="off">
      <div>
        <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required class="form-input mt-1" autocomplete="off">
      </div>
      <div>
        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" placeholder="••••••••" required class="form-input mt-1" autocomplete="new-password">
      </div>
      <div>
        <button type="submit" class="form-button">
          Login
        </button>
      </div>
    </form>
    <p id="error-message" class="text-sm text-red-600 text-center" style="display: none;"></p>
    <p class="text-sm text-center text-gray-600">
      Don't have an account? <a href="register.html" class="font-medium text-blue-600 hover:underline">Register here</a>
    </p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
