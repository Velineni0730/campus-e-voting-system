<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Election Results - E-Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/auth.js"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-gray-800">E-Voting</a>
            <a href="index.html" class="text-blue-600 hover:underline">Back to Elections</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-10">Election Results</h1>
        <div id="results" class="space-y-8">
            </div>
    </main>

    <script>
        const resultsDiv = document.getElementById('results');
        const electionId = localStorage.getItem("selectedElectionId");

        db.collection("positions").where("electionID", "==", electionId).get().then(positionsSnap => {
            if (positionsSnap.empty) {
                resultsDiv.innerHTML = "<p class='text-center text-gray-600'>No results available for this election yet.</p>";
            }
            positionsSnap.forEach(positionDoc => {
                const position = positionDoc.data();
                const positionDiv = document.createElement('div');
                positionDiv.className = 'bg-white p-6 rounded-lg shadow-md';
                positionDiv.innerHTML = `<h3 class="text-2xl font-bold text-gray-800 mb-4">${position.title}</h3><div id="candidates-results-${positionDoc.id}" class="space-y-3"></div>`;
                resultsDiv.appendChild(positionDiv);

                db.collection("candidates").where("positionID", "==", positionDoc.id).get().then(candidatesSnap => {
                    const candidatesResultsContainer = document.getElementById(`candidates-results-${positionDoc.id}`);
                    candidatesSnap.forEach(candidateDoc => {
                        const candidate = candidateDoc.data();
                        db.collection("votes").where("candidateID", "==", candidateDoc.id).get().then(votesSnap => {
                            const voteCount = votesSnap.size;
                            const p = document.createElement('p');
                            p.className = 'text-gray-700 flex justify-between items-center';
                            p.innerHTML = `<span>${candidate.name}</span><span class="font-bold text-blue-600">${voteCount} votes</span>`;
                            candidatesResultsContainer.appendChild(p);
                        });
                    });
                });
            });
        });
    </script>
</body>
</html>
